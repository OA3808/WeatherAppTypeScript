name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: |
        npm install
        npm run test